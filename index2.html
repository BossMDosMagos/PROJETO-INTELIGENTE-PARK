<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inteligente Park - Painel Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Toque de vidro e gradientes modernos */
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div class="flex h-screen overflow-hidden">

        <aside class="w-64 bg-white shadow-xl hidden md:flex flex-col border-r border-slate-200">
            <div class="p-6 border-b">
                <h1 class="text-xl font-bold text-blue-700 flex items-center gap-2">
                    <i class="fas fa-car-side"></i> Inteligente Park
                </h1>
                <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Painel Master</p>
            </div>
            
            <nav class="flex-1 mt-4 overflow-y-auto">
                <a href="#" class="sidebar-item flex items-center p-4 text-blue-600 font-semibold bg-blue-50">
                    <i class="fas fa-home w-8 text-lg"></i> Principal
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 hover:text-blue-600 transition">
                    <i class="fas fa-sign-in-alt w-8"></i> 1 - Entrada
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 hover:text-blue-600 transition">
                    <i class="fas fa-sign-out-alt w-8"></i> 2 - Saída
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 hover:text-blue-600 transition">
                    <i class="fas fa-tasks w-8"></i> 3 - Controle
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 hover:text-blue-600 transition">
                    <i class="fas fa-user-tie w-8"></i> 4 - Operador
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 hover:text-blue-600 transition">
                    <i class="fas fa-chart-line w-8"></i> 5 - Relatórios
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 hover:text-blue-600 transition">
                    <i class="fas fa-cash-register w-8"></i> 6 - Caixa
                </a>
            </nav>

            <div class="p-4 bg-slate-50 border-t">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs font-medium text-slate-600">Sincronizado</span>
                </div>
                <p class="text-[10px] text-slate-400">Série: 10007842 | Versão 2.0</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-10">
                <div class="flex items-center gap-4 text-slate-500">
                    <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <span class="hidden sm:inline font-medium uppercase text-sm tracking-tighter">Sexta, 06/Mar/2026 - 09:41:58</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold leading-none uppercase">Josemyr</p>
                        <p class="text-[10px] text-blue-600 font-bold uppercase">Nível: Master</p>
                    </div>
                    <button class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white transition">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </header>

            <section class="p-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                <button class="flex flex-col items-center justify-center p-4 bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-400 transition group">
                    <i class="fas fa-parking text-2xl text-blue-600 mb-2 group-hover:scale-110 transition"></i>
                    <span class="text-xs font-bold uppercase">Pátio (0)</span>
                </button>
                <button class="flex flex-col items-center justify-center p-4 bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-green-400 transition group">
                    <i class="fas fa-check-circle text-2xl text-green-600 mb-2 group-hover:scale-110 transition"></i>
                    <span class="text-xs font-bold uppercase">Saídas (0)</span>
                </button>
                <button class="flex flex-col items-center justify-center p-4 bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-orange-400 transition group">
                    <i class="fas fa-dollar-sign text-2xl text-orange-500 mb-2 group-hover:scale-110 transition"></i>
                    <span class="text-xs font-bold uppercase">Caixa</span>
                </button>
                <button class="flex flex-col items-center justify-center p-4 bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-purple-400 transition group">
                    <i class="fas fa-users text-2xl text-purple-600 mb-2 group-hover:scale-110 transition"></i>
                    <span class="text-xs font-bold uppercase">Mensalistas</span>
                </button>
            </section>

            <section class="px-6 pb-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-plus-circle text-blue-600"></i> Registrar Entrada
                        </h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Placa</label>
                                <input type="text" placeholder="ABC-1234" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:outline-none text-xl font-mono uppercase tracking-widest transition">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <button class="p-4 rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-600 font-bold flex items-center justify-center gap-2">
                                    <i class="fas fa-car"></i> Carro
                                </button>
                                <button class="p-4 rounded-xl border-2 border-slate-200 text-slate-400 font-bold hover:border-blue-200 hover:text-blue-400 transition flex items-center justify-center gap-2">
                                    <i class="fas fa-motorcycle"></i> Moto
                                </button>
                            </div>
                            <button class="w-full p-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 uppercase">
                                Registrar Entrada
                            </button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 h-full min-h-[400px]">
                        <div class="p-4 border-b flex justify-between items-center">
                            <h2 class="font-bold text-slate-600 uppercase text-sm tracking-wider">Veículos no Pátio</h2>
                            <span class="bg-slate-100 text-slate-500 text-[10px] font-bold px-2 py-1 rounded">Total: 0</span>
                        </div>
                        <div class="flex flex-col items-center justify-center h-full opacity-20 py-20">
                            <i class="fas fa-parking text-6xl mb-4"></i>
                            <p class="font-bold">Nenhum veículo no pátio</p>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>
</body>
</html>
