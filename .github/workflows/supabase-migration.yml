name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - '.github/workflows/supabase-migration.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Check for migrations
        id: check_migrations
        run: |
          MIGRATIONS=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'supabase/migrations/' || echo "")
          if [ ! -z "$MIGRATIONS" ]; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "Migrações encontradas: $MIGRATIONS"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "Nenhuma migração nova encontrada"
          fi

      - name: Link Supabase project
        if: steps.check_migrations.outputs.has_migrations == 'true'
        run: npx supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        if: steps.check_migrations.outputs.has_migrations == 'true'
        run: npx supabase migration up
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify schema
        if: steps.check_migrations.outputs.has_migrations == 'true'
        run: npx supabase db pull --schema-only
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create deployment status
        if: steps.check_migrations.outputs.has_migrations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.deployments.createStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ github.run_id }},
              state: 'success',
              description: 'Migrações do Supabase aplicadas com sucesso',
              environment_url: 'https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROJECT_ID }}'
            })

      - name: Notify success
        if: steps.check_migrations.outputs.has_migrations == 'true'
        run: |
          echo "✅ Migrações aplicadas com sucesso em produção"
          echo "🔗 Dashboard: https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Notify no changes
        if: steps.check_migrations.outputs.has_migrations == 'false'
        run: echo "ℹ️ Nenhuma migração para aplicar"

      - name: Rollback on failure
        if: failure() && steps.check_migrations.outputs.has_migrations == 'true'
        run: |
          echo "❌ Erro ao aplicar migrações!"
          echo "Verifique os logs acima para mais detalhes"
        continue-on-error: true
